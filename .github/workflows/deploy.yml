name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Serves the web build at https://<user>.github.io/lifetap/ so it can be
# installed on an iPad from Safari (Share -> Add to Home Screen), no Mac needed.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/cirruslabs/flutter:3.44.0
    steps:
      - uses: actions/checkout@v4
      - run: git config --global --add safe.directory '*'
      - run: flutter pub get
      - name: Build web
        # --pwa-strategy=none skips the Flutter service worker so deploys aren't
        # hidden behind an offline cache that ignores refreshes. Trades offline
        # support for changes showing up on a normal reload.
        run: flutter build web --release --base-href /lifetap/ --pwa-strategy=none
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
